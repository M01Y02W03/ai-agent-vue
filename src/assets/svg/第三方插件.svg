<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pluginGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6F61;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7D00FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 主容器 -->
  <rect x="8" y="12" width="48" height="40" rx="6" ry="6" fill="url(#pluginGradient)" opacity="0.1" stroke="url(#pluginGradient)" stroke-width="2"/>
  
  <!-- Docker图标 -->
  <g transform="translate(12, 16)">
    <rect x="0" y="4" width="4" height="3" fill="#0db7ed" rx="1"/>
    <rect x="5" y="4" width="4" height="3" fill="#0db7ed" rx="1"/>
    <rect x="10" y="4" width="4" height="3" fill="#0db7ed" rx="1"/>
    <rect x="5" y="0" width="4" height="3" fill="#0db7ed" rx="1"/>
    <path d="M0 8 L14 8 Q16 8 16 10 L16 12 Q16 14 14 14 L0 14 Q-2 14 -2 12 L-2 10 Q-2 8 0 8" fill="#0db7ed" opacity="0.8"/>
  </g>
  
  <!-- Redis图标 -->
  <g transform="translate(32, 16)">
    <ellipse cx="7" cy="4" rx="7" ry="2" fill="#dc382d"/>
    <ellipse cx="7" cy="6" rx="7" ry="2" fill="#dc382d" opacity="0.8"/>
    <ellipse cx="7" cy="8" rx="7" ry="2" fill="#dc382d" opacity="0.6"/>
    <path d="M2 6 Q4 4 6 6 Q8 4 10 6 Q12 4 14 6" stroke="#fff" stroke-width="1" fill="none"/>
  </g>
  
  <!-- MySQL图标 -->
  <g transform="translate(12, 32)">
    <circle cx="6" cy="6" r="5" fill="#00758f" opacity="0.8"/>
    <path d="M3 3 L9 3 M3 6 L9 6 M3 9 L9 9" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="6" cy="6" r="2" fill="none" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Sa-Token图标 -->
  <g transform="translate(32, 32)">
    <rect x="2" y="2" width="10" height="8" rx="2" fill="#4CAF50" opacity="0.8"/>
    <circle cx="7" cy="6" r="2" fill="none" stroke="#fff" stroke-width="1.5"/>
    <path d="M7 8 L7 10" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- 连接线 -->
  <path d="M20 24 L32 24 M32 24 L44 24 M26 32 L38 32" stroke="url(#pluginGradient)" stroke-width="1" opacity="0.6" stroke-dasharray="2,2">
    <animate attributeName="stroke-dashoffset" values="0;4" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <!-- 中心连接点 -->
  <circle cx="32" cy="32" r="3" fill="url(#pluginGradient)" filter="url(#glow)">
    <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>